kind = "web"
previewPath = "/"
title = "Quantum Audit Command Center"
version = "1.0.0"
id = "artifacts/quantum-audit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24917

[services.development]
run = "pnpm --filter @workspace/quantum-audit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quantum-audit", "run", "build" ]
publicDir = "artifacts/quantum-audit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24917"
BASE_PATH = "/"
